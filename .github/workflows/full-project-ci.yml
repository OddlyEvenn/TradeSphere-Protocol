name: Full Project CI (Contracts, Backend, Frontend)

on:
  push:
    branches: [ "main", "dev", "Even" ]
  pull_request:
    branches: [ "main", "dev", "Even" ]

jobs:
  # --- Smart Contracts ---
  contracts:
    name: Contracts CI & Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required for uploading SARIF
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Configure NPM for CI Stability
        run: |
          npm config set fetch-retries 10
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
      - name: Install Root Dependencies
        run: npm ci || npm install --no-audit --no-fund
      - name: Compile Contracts
        run: npx hardhat compile
      - name: Run Tests
        run: npx hardhat test
      - name: Solhint Linting
        run: npx solhint 'contracts/**/*.sol'
      - name: Slither Security Scan
        uses: crytic/slither-action@v0.4.1
        with:
          target: '.'
          fail-on: 'high'
          sarif: results.sarif
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Ensure report is uploaded even if scan fails
        with:
          sarif_file: results.sarif

  # --- Backend ---
  backend:
    name: Backend CI & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      - name: Configure NPM for CI Stability
        run: |
          npm config set fetch-retries 10
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci || npm install --no-audit --no-fund
      - name: Lint Backend (ESLint)
        working-directory: ./backend
        run: npx eslint src/**/*.ts --quiet
      - name: Prisma Generate
        working-directory: ./backend
        run: npx prisma generate
      - name: Build Backend (TypeScript)
        working-directory: ./backend
        run: npm run build

  # --- Frontend ---
  frontend:
    name: Frontend CI & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Configure NPM for CI Stability
        run: |
          npm config set fetch-retries 10
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci || npm install --no-audit --no-fund
      - name: Lint Frontend
        working-directory: ./frontend
        run: npx eslint . --ext ts,tsx --quiet
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
