name: Full Project CI (Contracts, Backend, Frontend)

on:
  push:
    branches: [ "main", "dev", "Even" ]
  pull_request:
    branches: [ "main", "dev", "Even" ]

jobs:
  # --- Smart Contracts ---
  contracts:
    name: Contracts CI & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Root Dependencies
        run: npm ci || npm install
      - name: Compile Contracts
        run: npx hardhat compile
      - name: Run Tests
        run: npx hardhat test
      - name: Solhint Linting
        run: npx solhint 'contracts/**/*.sol'
      - name: Slither Security Scan
        uses: crytic/slither-action@v0.4.0
        with:
          target: '.'
          fail-on: 'high'
          slither-args: '--nocompile'


  # --- Backend ---
  backend:
    name: Backend CI & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci || npm install
      - name: Lint Backend (ESLint)
        working-directory: ./backend
        run: npx eslint src/**/*.ts --quiet
      - name: Prisma Generate
        working-directory: ./backend
        run: npx prisma generate
      - name: Build Backend (TypeScript)
        working-directory: ./backend
        run: npm run build

  # --- Frontend ---
  frontend:
    name: Frontend CI & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci || npm install
      - name: Lint Frontend
        working-directory: ./frontend
        run: npx eslint . --ext ts,tsx --quiet
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
